# Hygraph Localized Queries Contract

## 1. Home Page Query (`PageInfoQuery`)
```graphql
query PageInfoQuery {
  # Portuguese Content
  ptPage: page(where: {slug: "home"}, locales: [pt_BR]) {
    introduction {
      raw
    }
    technologies {
      name
    }
    profilePicture {
      url
    }
    socials {
      url
      iconSvg
    }
    knownTechs {
      iconSvg
      name
      startDate
    }
    highlightProjects {
      slug
      thumbnail {
        url
      }
      title
      shortDescription
      technologies {
        name
      }
    }
  }
  # English Content
  enPage: page(where: {slug: "home"}, locales: [en]) {
    introduction {
      raw
    }
    technologies {
      name
    }
    profilePicture {
      url
    }
    socials {
      url
      iconSvg
    }
    knownTechs {
      iconSvg
      name
      startDate
    }
    highlightProjects {
      slug
      thumbnail {
        url
      }
      title
      shortDescription
      technologies {
        name
      }
    }
  }
  # Portuguese Experiences
  ptWorkExperiences: workExperiences(locales: [pt_BR]) {
    companyLogo {
      url
    }
    role
    companyName
    companyUrl
    startDate
    endDate
    description {
      raw
    }
    technologies {
      name
    }
  }
  # English Experiences
  enWorkExperiences: workExperiences(locales: [en]) {
    companyLogo {
      url
    }
    role
    companyName
    companyUrl
    startDate
    endDate
    description {
      raw
    }
    technologies {
      name
    }
  }
}
```

