## 3. Project Detail Query (`ProjectQuery`)
```graphql
query ProjectQuery($slug: String!) {
  # Portuguese Details
  ptProject: project(where: {slug: $slug}, locales: [pt_BR]) {
    pageThumbnail {
      url
    }
    thumbnail {
      url
    }
    sections {
      title
      image {
        url
      }
    }
    title
    shortDescription
    description {
      raw
      text
    }
    technologies {
      name
    }
    liveProjectUrl
    gitHubUrl
  }
  # English Details
  enProject: project(where: {slug: $slug}, locales: [en]) {
    pageThumbnail {
      url
    }
    thumbnail {
      url
    }
    sections {
      title
      image {
        url
      }
    }
    title
    shortDescription
    description {
      raw
      text
    }
    technologies {
      name
    }
    liveProjectUrl
    gitHubUrl
  }
}
```
