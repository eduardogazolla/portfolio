## 2. Projects List Query (`ProjectsQuery`)
```graphql
query ProjectsQuery {
  # Portuguese List
  ptProjects: projects(locales: [pt_BR]) {
    shortDescription
    slug
    title
    thumbnail {
      url
    }
    technologies {
      name
    }
  }
  # English List
  enProjects: projects(locales: [en]) {
    shortDescription
    slug
    title
    thumbnail {
      url
    }
    technologies {
      name
    }
  }
}
```

